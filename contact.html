    <style>
        
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 450px;
            margin: 30px auto 0 auto;
        }
        .contact-box {
            background: #ffffff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            text-align: left;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
        }
        .contact-box:hover {
            transform: translateX(5px);
            border-color: #ffe4e6;
            background: #fffafb;
        }
        .contact-icon {
            font-size: 1.6rem;
            margin-right: 18px;
        }
        .contact-details h4 {
            margin: 0;
            font-size: 0.85rem;
            color: #888;
            font-weight: 300;
        }
        .contact-details p {
            margin: 2px 0 0 0;
            font-size: 1.05rem;
            font-weight: 500;
            color: #444;
        }
    </style>
</head>
